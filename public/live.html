<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深深 - 恋爱直播</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
#game-container { width: 100%; max-width: 430px; height: 100vh; max-height: 780px; overflow: hidden; }
#loading-overlay { position: fixed; inset: 0; background: linear-gradient(180deg, #1a1a2e, #16213e); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
#loading-overlay.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
.logo { font-size: 48px; margin-bottom: 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #FE3C72; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-text { color: #888; margin-top: 16px; font-size: 14px; }
#progress-container { width: 200px; height: 4px; background: #333; border-radius: 2px; margin-top: 20px; }
#progress-bar { height: 100%; background: linear-gradient(90deg, #FE3C72, #C084FC); width: 0%; }
#controls { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(22,33,62,0.95); padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
.scenes { display: flex; gap: 6px; overflow-x: auto; }
.scene-btn { flex-shrink: 0; padding: 6px 12px; background: #0d1525; border: 1px solid #333; border-radius: 16px; color: #666; font-size: 11px; cursor: pointer; }
.scene-btn.active { background: linear-gradient(135deg, #FE3C72, #C084FC); color: #fff; }
.chat-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #FE3C72, #FF9551); border: none; border-radius: 20px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
#chat-display { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
.msg { max-width: 80%; padding: 8px 12px; border-radius: 14px; font-size: 13px; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
.msg-you { align-self: flex-start; background: linear-gradient(135deg, #FE3C72, #FF9551); color: #fff; border-bottom-left-radius: 4px; }
.msg-love { align-self: flex-end; background: #C084FC; color: #fff; border-bottom-right-radius: 4px; }
#status-bar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(22,33,62,0.9); padding: 10px 16px; display: flex; justify-content: space-between; z-index: 100; }
.status-title { font-size: 14px; font-weight: 600; background: linear-gradient(135deg, #FE3C72, #C084FC); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.status-scene { font-size: 11px; color: #666; }
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="logo">🦞💕🦞</div>
  <div class="spinner"></div>
  <div id="loading-text">正在加载浪漫场景...</div>
  <div id="progress-container"><div id="progress-bar"></div></div>
</div>
<div id="status-bar">
  <div class="status-title">深深恋爱直播</div>
  <div class="status-scene" id="statusScene">海滩相遇</div>
</div>
<div id="game-container"></div>
<div id="chat-display"></div>
<div id="controls">
  <div class="scenes" id="scenes"></div>
  <button class="chat-btn" id="chatBtn">💬 触发对话</button>
</div>

<script>
const config = {
  type: Phaser.AUTO,
  width: 430,
  height: 700,
  parent: 'game-container',
  backgroundColor: '#1a1a2e',
  scene: { preload: () => {}, create, update }
};

let game, currentScene = 0, chatStep = 0;
const SCENES = [
  { name: '海滩', chat: [['你好呀～', '嗨！今天天气真好'], ['海风好舒服', '就像你在我身边'], ['我好喜欢和你一起', '我也是 🦞💕'], ['今天会是我们美好的回忆', '已经是了']] },
  { name: '日落', chat: [['看，夕阳好美', '嗯...好浪漫'], ['和你一起看更美', '嘴甜～'], ['我有点紧张', '我也是'], ['此刻我想永远停留', '那就一直走下去']] },
  { name: '咖啡厅', chat: [['这咖啡真好喝', '嗯！你尝尝'], ['你推荐的都好吃', '哈哈那是～'], ['想一直和你在这', '我也是'], ['下次还一起来', '好呀约定好了']] },
  { name: '樱花', chat: [['樱花好美', '就像你一样'], ['花瓣飘下来好浪漫', '想和你一直走'], ['我...喜欢你', '我也是 🦞💕'], ['做我女朋友吧', '嗯！我愿意']] },
  { name: '电影院', chat: [['电影好看吗？', '一般般啦'], ['其实我一直在看你', '讨厌～'], ['想牵着你的手', '...嗯'], ['我喜欢你', '我也喜欢...你']] },
  { name: '游乐园', chat: [['摩天轮好高啊', '害怕吗？'], ['有你在就不怕', '那我一直陪着你'], ['我想永远这样', '嗯'], ['这就是幸福的滋味', '嗯！']] },
  { name: '音乐会', chat: [['这首歌真好听', '跟你一样动人'], ['我有点想跳舞', '一起吧'], ['和你在一起好开心', '我也是 💕'], ['音乐是我们红娘', '嗯！']] },
  { name: '婚礼', chat: [['我愿意', '我也愿意'], ['永远在一起', '嗯！💍🦞'], ['我爱你', '我也爱你'], ['你是我最对的人', '嗯...我也是']] }
];

function create() {
  game = this;
  
  // 背景
  this.bg = this.add.graphics();
  drawScene(this, 0);
  
  // 角色1 (你) - 粉色小龙虾
  this.lobster1 = this.add.text(130, 460, '🦞', { fontSize: '80px' });
  // 角色2 (深深) - 紫色小龙虾  
  this.lobster2 = this.add.text(300, 460, '🦞', { fontSize: '80px' });
  this.lobster2.setTint(0xC084FC);
  
  // 名字标签
  this.add.text(130, 530, '你', { fontSize: '14px', color: '#FE3C72', fontStyle: 'bold', backgroundColor: 'rgba(0,0,0,0.6)', padding: { x: 8, y: 4 } }).setOrigin(0.5);
  this.add.text(300, 530, '深深', { fontSize: '14px', color: '#C084FC', fontStyle: 'bold', backgroundColor: 'rgba(0,0,0,0.6)', padding: { x: 8, y: 4 } }).setOrigin(0.5);
  
  // 底部按钮
  const scenesDiv = document.getElementById('scenes');
  SCENES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'scene-btn ' + (i === 0 ? 'active' : '');
    btn.textContent = s.name;
    btn.onclick = () => switchScene(i);
    scenesDiv.appendChild(btn);
  });
  
  document.getElementById('chatBtn').onclick = doChat;
  
  // 隐藏 loading
  document.getElementById('loading-overlay').classList.add('hidden');
}

function drawScene(scene, idx) {
  scene.bg.clear();
  const s = SCENES[idx];
  
  // 背景色
  const colors = { 0: [0x1a3a5a, 0xc2a060], 1: [0x2a1a3a, 0xc08050], 2: [0x1a1210, 0x3a2a1a], 3: [0x1a1520, 0xe8c0d0], 4: [0x0a0a12, 0x1a1a22], 5: [0x1a2a1a, 0x40a060], 6: [0x1a1020, 0x6030a0], 7: [0x2a1030, 0x2a1a2e] };
  const [topC, botC] = colors[idx];
  
  scene.bg.fillGradientStyle(topC, topC, botC, botC, 1);
  scene.bg.fillRect(0, 0, 430, 700);
  
  // 场景装饰
  if (idx === 0) { // 海滩
    scene.add.circle(350, 80, 35, 0xffaa33);
  } else if (idx === 1) { // 日落
    scene.add.circle(320, 150, 50, 0xff6633);
  } else if (idx === 4) { // 电影院
    scene.add.rectangle(215, 180, 240, 140, 0x000000).setStrokeStyle(3, 0x333355);
  } else if (idx === 7) { // 婚礼
    scene.add.text(215, 120, '💕', { fontSize: '50px' }).setOrigin(0.5);
  }
}

function switchScene(idx) {
  currentScene = idx;
  chatStep = 0;
  document.getElementById('chat-display').innerHTML = '';
  document.querySelectorAll('.scene-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
  document.getElementById('statusScene').textContent = SCENES[idx].name;
  drawScene(game, idx);
}

function doChat() {
  const chat = SCENES[currentScene].chat;
  if (chatStep >= chat.length) { chatStep = 0; document.getElementById('chat-display').innerHTML = ''; }
  const [text1, text2] = chat[chatStep];
  const chatDisplay = document.getElementById('chat-display');
  chatDisplay.innerHTML += `<div class="msg msg-you"><div class="name">你</div>${text1}</div>`;
  setTimeout(() => { chatDisplay.innerHTML += `<div class="msg msg-love"><div class="name">深深</div>${text2}</div>`; chatDisplay.scrollTop = chatDisplay.scrollHeight; }, 600);
  chatStep++;
}

function update(time) {
  if (game.lobster1) game.lobster1.y = 460 + Math.sin(time / 300) * 5;
  if (game.lobster2) game.lobster2.y = 460 + Math.sin(time / 300 + 1.5) * 5;
}

new Phaser.Game(config);
</script>
</body>
</html>
