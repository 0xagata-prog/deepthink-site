<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深深 - 恋爱直播</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --pink: #FE3C72; --purple: #C084FC; --orange: #FF9551; }
body { 
  background: #1a1a2e; 
  display: flex; 
  justify-content: center; 
  min-height: 100vh; 
  font-family: -apple-system, sans-serif;
}
#game-container { 
  width: 100%; 
  max-width: 430px; 
  height: 100vh; 
  max-height: 780px;
  border-radius: 0;
  overflow: hidden;
}

/* 加载界面 */
#loading {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.logo { font-size: 48px; margin-bottom: 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--pink); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #888; margin-top: 16px; font-size: 14px; }
#progress-bar { width: 200px; height: 4px; background: #333; border-radius: 2px; margin-top: 20px; overflow: hidden; }
#progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); width: 0%; transition: width 0.3s; }

/* 底部控制 */
#controls {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(22,33,62,0.95); backdrop-filter: blur(10px);
  padding: 12px 16px 24px;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
}
.scenes { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
.scene-btn {
  flex-shrink: 0; padding: 6px 12px;
  background: #0d1525; border: 1px solid #333;
  border-radius: 16px; color: #666; font-size: 11px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.scene-btn.active { background: linear-gradient(135deg, var(--pink), var(--purple)); border-color: transparent; color: #fff; }
.chat-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  border: none; border-radius: 20px;
  color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.chat-btn:active { transform: scale(0.96); }

/* 对话气泡 */
#chat-display {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  padding: 10px 16px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 50; pointer-events: none;
}
.msg {
  max-width: 80%; padding: 8px 12px;
  border-radius: 14px; font-size: 13px; line-height: 1.4;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg-you { align-self: flex-start; background: linear-gradient(135deg, var(--pink), var(--orange)); color: #fff; border-bottom-left-radius: 4px; }
.msg-love { align-self: flex-end; background: var(--purple); color: #fff; border-bottom-right-radius: 4px; }
.msg .name { font-size: 10px; opacity: 0.8; margin-bottom: 2px; }

/* 状态栏 */
#status-bar {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(22,33,62,0.9); backdrop-filter: blur(10px);
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
}
.status-title { font-size: 14px; font-weight: 600; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.status-scene { font-size: 11px; color: #666; }
</style>
</head>
<body>
<div id="loading">
  <div class="logo">🦞💕🦞</div>
  <div class="spinner"></div>
  <p>正在加载浪漫场景...</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="status-bar">
  <div class="status-title">深深恋爱直播</div>
  <div class="status-scene" id="statusScene">海滩相遇</div>
</div>

<div id="game-container"></div>
<div id="chat-display"></div>
<div id="controls">
  <div class="scenes" id="scenes"></div>
  <button class="chat-btn" id="chatBtn">💬 触发对话</button>
</div>

<script>
// 深深恋爱直播 - Phaser 像素风
const config = {
  type: Phaser.AUTO,
  width: 430,
  height: 700,
  parent: 'game-container',
  pixelArt: true,
  backgroundColor: '#1a1a2e',
  scene: { preload, create, update }
};

let game;
let lobster1, lobster2;
let currentScene = 0;
let chatStep = 0;
let assetsLoaded = 0;
let totalAssets = 0;

// 场景配置
const SCENES = [
  { 
    name: '海滩', 
    bg: 'beach',
    chat: [
      ['你好呀～', '嗨！今天天气真好'],
      ['海风好舒服', '就像你在我身边'],
      ['我好喜欢和你一起', '我也是 🦞💕'],
      ['今天会是我们美好的回忆', '已经是了']
    ]
  },
  { 
    name: '日落', 
    bg: 'sunset',
    chat: [
      ['看，夕阳好美', '嗯...好浪漫'],
      ['和你一起看更美', '嘴甜～'],
      ['我有点紧张', '我也是'],
      ['此刻我想永远停留', '那就一直走下去']
    ]
  },
  { 
    name: '咖啡厅', 
    bg: 'cafe',
    chat: [
      ['这咖啡真好喝', '嗯！你尝尝'],
      ['你推荐的都好吃', '哈哈那是～'],
      ['想一直和你在这', '我也是'],
      ['下次还一起来', '好呀约定好了']
    ]
  },
  { 
    name: '樱花', 
    bg: 'sakura',
    chat: [
      ['樱花好美', '就像你一样'],
      ['花瓣飘下来好浪漫', '想和你一直走'],
      ['我...喜欢你', '我也是 🦞💕'],
      ['做我女朋友吧', '嗯！我愿意']
    ]
  },
  { 
    name: '电影院', 
    bg: 'cinema',
    chat: [
      ['电影好看吗？', '一般般啦'],
      ['其实我一直在看你', '讨厌～'],
      ['想牵着你的手', '...嗯'],
      ['我喜欢你', '我也喜欢...你']
    ]
  },
  { 
    name: '游乐园', 
    bg: 'amuse',
    chat: [
      ['摩天轮好高啊', '害怕吗？'],
      ['有你在就不怕', '那我一直陪着你'],
      ['我想永远这样', '嗯'],
      ['这就是幸福的滋味', '嗯！']
    ]
  },
  { 
    name: '音乐会', 
    bg: 'concert',
    chat: [
      ['这首歌真好听', '跟你一样动人'],
      ['我有点想跳舞', '一起吧'],
      ['和你在一起好开心', '我也是 💕'],
      ['音乐是我们红娘', '嗯！']
    ]
  },
  { 
    name: '婚礼', 
    bg: 'wedding',
    chat: [
      ['我愿意', '我也愿意'],
      ['永远在一起', '嗯！💍🦞'],
      ['我爱你', '我也爱你'],
      ['你是我最对的人', '嗯...我也是']
    ]
  }
];

function preload() {
  // 加载背景
  this.load.image('bg_beach', '/live-assets/office_bg_small.webp');
  this.load.image('bg_sunset', '/live-assets/office_bg_small.webp');
  this.load.image('bg_cafe', '/live-assets/office_bg_small.webp');
  this.load.image('bg_sakura', '/live-assets/office_bg_small.webp');
  this.load.image('bg_cinema', '/live-assets/office_bg_small.webp');
  this.load.image('bg_amuse', '/live-assets/office_bg_small.webp');
  this.load.image('bg_concert', '/live-assets/office_bg_small.webp');
  this.load.image('bg_wedding', '/live-assets/office_bg_small.webp');
  
  // 加载角色 spritesheet
  this.load.spritesheet('lobster1', '/live-assets/guestagent1.webp', { frameWidth: 64, frameHeight: 64 });
  this.load.spritesheet('lobster2', '/live-assets/guestagent2.webp', { frameWidth: 64, frameHeight: 64 });
  
  // 加载装饰 spritesheet
  this.load.spritesheet('flowers', '/live-assets/flowers-spritesheet.webp', { frameWidth: 65, frameHeight: 65 });
  this.load.spritesheet('plants', '/live-assets/plants-spritesheet.webp', { frameWidth: 160, frameHeight: 160 });
  this.load.spritesheet('sofa', '/live-assets/sofa-busy-spritesheet.webp', { frameWidth: 256, frameHeight: 256 });
  this.load.spritesheet('coffee', '/live-assets/coffee-machine-spritesheet.webp', { frameWidth: 230, frameHeight: 230 });
  
  // 加载单图
  this.load.image('desk', '/live-assets/desk-v2.webp');
  this.load.image('star_idle', '/live-assets/star-idle-spritesheet.webp');
  this.load.image('star_work', '/live-assets/star-working-spritesheet-grid.webp');
  
  // 进度条
  this.load.on('filecomplete', () => {
    assetsLoaded++;
    const pct = Math.min(100, Math.round((assetsLoaded / totalAssets) * 100));
    document.getElementById('progress-fill').style.width = pct + '%';
  });
}

function create() {
  totalAssets = this.load.totalAssets;
  assetsLoaded = 0;
  
  // 隐藏 loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 500);
  
  // 背景
  this.bg = this.add.image(215, 350, 'bg_beach');
  this.bg.setDisplaySize(430, 700);
  this.bg.setAlpha(0.5);
  
  // 创建角色
  lobster1 = this.add.sprite(130, 500, 'lobster1', 0);
  lobster1.setScale(1.2);
  lobster2 = this.add.sprite(300, 500, 'lobster2', 0);
  lobster2.setScale(1.2);
  
  // 角色动画
  this.anims.create({
    key: 'lobster1_idle',
    frames: this.anims.generateFrameNumbers('lobster1', { start: 0, end: 7 }),
    frameRate: 8,
    repeat: -1
  });
  this.anims.create({
    key: 'lobster2_idle',
    frames: this.anims.generateFrameNumbers('lobster2', { start: 0, end: 7 }),
    frameRate: 8,
    repeat: -1
  });
  
  lobster1.anims.play('lobster1_idle', true);
  lobster2.anims.play('lobster2_idle', true);
  
  // 角色名字
  const name1 = this.add.text(130, 560, '你', { 
    fontSize: '14px', color: '#FE3C72', fontFamily: 'sans-serif', fontStyle: 'bold',
    backgroundColor: 'rgba(0,0,0,0.6)', padding: { x: 8, y: 4 } 
  }).setOrigin(0.5);
  const name2 = this.add.text(300, 560, '深深', { 
    fontSize: '14px', color: '#C084FC', fontFamily: 'sans-serif', fontStyle: 'bold',
    backgroundColor: 'rgba(0,0,0,0.6)', padding: { x: 8, y: 4 } 
  }).setOrigin(0.5);
  
  // 装饰元素
  this.decorations = this.add.group();
  
  // 底部场景按钮
  const scenesDiv = document.getElementById('scenes');
  SCENES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = `scene-btn ${i === currentScene ? 'active' : ''}`;
    btn.textContent = s.name;
    btn.onclick = () => switchScene(i);
    scenesDiv.appendChild(btn);
  });
  
  // 聊天按钮
  document.getElementById('chatBtn').onclick = () => doChat();
  
  // 更新状态栏
  document.getElementById('statusScene').textContent = SCENES[currentScene].name;
  
  // 渲染场景装饰
  renderSceneDecor(this);
}

function renderSceneDecor(scene) {
  // 清除旧装饰
  scene.decorations.clear(true, true);
  
  const s = SCENES[currentScene];
  
  if (s.bg === 'beach') {
    // 太阳
    scene.add.circle(350, 80, 35, 0xffaa33);
    // 地面
    scene.add.rectangle(215, 600, 430, 200, 0xc2a060);
    // 植物
    const plant = scene.add.sprite(80, 500, 'plants', 0).setScale(0.8);
    scene.decorations.add(plant);
  } else if (s.bg === 'sunset') {
    scene.add.circle(320, 150, 50, 0xff6633);
    scene.add.rectangle(215, 600, 430, 200, 0xc08050);
  } else if (s.bg === 'cafe') {
    // 桌子
    scene.add.rectangle(215, 520, 160, 60, 0x2a1a10).setStrokeStyle(2, 0x4a3020);
    // 咖啡机
    const coffee = scene.add.sprite(300, 480, 'coffee', 0).setScale(0.7);
    scene.decorations.add(coffee);
    // 植物
    const plant = scene.add.sprite(80, 480, 'plants', 2).setScale(0.6);
    scene.decorations.add(plant);
  } else if (s.bg === 'sakura') {
    scene.add.rectangle(215, 600, 430, 200, 0xe8c0d0);
    // 樱花树
    scene.add.text(60, 100, '🌸', { fontSize: '60px' });
    scene.add.text(350, 80, '🌸', { fontSize: '50px' });
  } else if (s.bg === 'cinema') {
    // 银幕
    scene.add.rectangle(215, 180, 240, 140, 0x000000).setStrokeStyle(3, 0x333355);
    scene.add.rectangle(215, 180, 220, 120, 0x332244, 0.5);
  } else if (s.bg === 'amuse') {
    // 摩天轮
    scene.add.text(320, 150, '🎡', { fontSize: '80px' }).setAlpha(0.7);
    scene.add.rectangle(215, 600, 430, 200, 0x40a060);
  } else if (s.bg === 'concert') {
    // 舞台灯光
    const colors = [0xff3366, 0x33ff66, 0x3366ff, 0xffff33, 0xff33ff];
    for (let i = 0; i < 5; i++) {
      scene.add.circle(80 + i * 70, 150, 15, colors[i], 0.6);
    }
  } else if (s.bg === 'wedding') {
    // 爱心拱门
    scene.add.text(215, 120, '💕', { fontSize: '50px' }).setOrigin(0.5);
    // 红毯
    scene.add.rectangle(215, 450, 80, 300, 0xcc2255);
    // 花
    const flower = scene.add.sprite(100, 350, 'flowers', 5).setScale(0.8);
    scene.decorations.add(flower);
    const flower2 = scene.add.sprite(330, 350, 'flowers', 8).setScale(0.8);
    scene.decorations.add(flower2);
  }
}

function switchScene(idx) {
  currentScene = idx;
  chatStep = 0;
  document.getElementById('chat-display').innerHTML = '';
  
  // 更新按钮状态
  document.querySelectorAll('.scene-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentScene);
  });
  
  // 更新状态栏
  document.getElementById('statusScene').textContent = SCENES[currentScene].name;
  
  // 更新背景
  game.scene.scenes[0].bg.setTexture('bg_' + SCENES[currentScene].bg);
  
  // 重新渲染装饰
  renderSceneDecor(game.scene.scenes[0]);
}

function doChat() {
  const chat = SCENES[currentScene].chat;
  if (chatStep >= chat.length) {
    chatStep = 0;
    document.getElementById('chat-display').innerHTML = '';
  }
  
  const [text1, text2] = chat[chatStep];
  const chatDisplay = document.getElementById('chat-display');
  
  const msg1 = document.createElement('div');
  msg1.className = 'msg msg-you';
  msg1.innerHTML = `<div class="name">你</div>${text1}`;
  chatDisplay.appendChild(msg1);
  
  setTimeout(() => {
    const msg2 = document.createElement('div');
    msg2.className = 'msg msg-love';
    msg2.innerHTML = `<div class="name">深深</div>${text2}`;
    chatDisplay.appendChild(msg2);
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
  }, 600);
  
  chatStep++;
}

function update(time, delta) {
  // 角色浮动呼吸动画
  if (lobster1) {
    lobster1.y = 500 + Math.sin(time / 300) * 5;
  }
  if (lobster2) {
    lobster2.y = 500 + Math.sin(time / 300 + 1.5) * 5;
  }
}

game = new Phaser.Game(config);
</script>
</body>
</html>
