<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深深 - 恋爱直播</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --pink: #FE3C72; --purple: #C084FC; --orange: #FF9551; }
body { 
  background: #1a1a2e; 
  display: flex; 
  justify-content: center; 
  min-height: 100vh; 
  overflow-x: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.app { 
  width: 100%; 
  max-width: 430px; 
  height: 100vh; 
  position: relative;
  overflow: hidden;
}

/* 场景层 */
.scene {
  position: absolute; inset: 0;
  transition: opacity 0.5s;
}
.scene-bg {
  position: absolute; inset: 0;
}

/* 场景装饰 */
.sun {
  position: absolute; top: 60px; right: 60px;
  width: 70px; height: 70px;
  border-radius: 50%;
  box-shadow: 0 0 40px currentColor;
}
.wave {
  position: absolute; left: 0; right: 0; height: 8px;
  background: rgba(100, 180, 255, 0.3);
  animation: wave 2s ease-in-out infinite;
}
@keyframes wave {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.tree { position: absolute; font-size: 80px; }
.petal {
  position: absolute; font-size: 16px;
  animation: fall 4s linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(700px) rotate(360deg); opacity: 0; }
}
.screen {
  position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
  width: 240px; height: 140px;
  background: #000; border: 3px solid #333;
  border-radius: 8px;
  overflow: hidden;
}
.screen-glow {
  position: absolute; inset: 8px;
  background: linear-gradient(135deg, #331a4a, #4a2066);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
.wheel { position: absolute; top: 80px; right: 40px; font-size: 90px; opacity: 0.6; animation: spin 20s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.stage-light {
  position: absolute; top: 0; width: 60px; height: 200px;
  transform-origin: bottom center;
  opacity: 0.4;
}
.arch {
  position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
  font-size: 60px;
}
.carpet {
  position: absolute; top: 300px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 350px;
  background: linear-gradient(180deg, #cc2255, #aa1144);
  border-radius: 4px;
}
.confetti { position: absolute; font-size: 20px; animation: confetti-fall 3s linear infinite; }
@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); }
  100% { transform: translateY(700px) rotate(720deg); }
}

/* 角色 */
.characters {
  position: absolute; bottom: 180px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 60px;
}
.char {
  display: flex; flex-direction: column; align-items: center;
  animation: float 2s ease-in-out infinite;
}
.char-emoji { font-size: 64px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
.char-name {
  margin-top: 8px; padding: 4px 12px;
  background: rgba(0,0,0,0.6);
  border-radius: 12px; font-size: 12px;
}
.char1 .char-name { color: var(--pink); }
.char2 .char-name { color: var(--purple); }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.char2 { animation-delay: 0.5s; }

/* 对话气泡 */
.chat-area {
  position: absolute; top: 60px; left: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 10px;
  max-height: 250px; overflow-y: auto;
}
.msg {
  max-width: 80%; padding: 10px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.4;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-you { 
  align-self: flex-start; 
  background: linear-gradient(135deg, var(--pink), var(--orange)); 
  color: #fff; border-bottom-left-radius: 4px; 
}
.msg-love { 
  align-self: flex-end; 
  background: var(--purple); 
  color: #fff; border-bottom-right-radius: 4px; 
}
.msg .name { font-size: 10px; opacity: 0.8; margin-bottom: 4px; }

/* 底部控制 */
.controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(22,33,62,0.95);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.scenes {
  display: flex; gap: 8px; overflow-x: auto;
  margin-bottom: 12px; padding-bottom: 8px;
}
.scene-btn {
  flex-shrink: 0; padding: 8px 14px;
  background: #0d1525; border: 1px solid #333;
  border-radius: 20px; color: #666; font-size: 13px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.scene-btn.active {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  border-color: transparent; color: #fff;
}
.chat-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  border: none; border-radius: 25px;
  color: #fff; font-size: 16px; font-weight: 600;
  cursor: pointer;
}
.chat-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- 场景层 -->
  <div class="scene" id="scene"></div>
  
  <!-- 对话区 -->
  <div class="chat-area" id="chatArea"></div>
  
  <!-- 角色 -->
  <div class="characters">
    <div class="char char1">
      <div class="char-emoji">🦞</div>
      <div class="char-name">你</div>
    </div>
    <div class="char char2">
      <div class="char-emoji">🦞</div>
      <div class="char-name">深深</div>
    </div>
  </div>
  
  <!-- 控制栏 -->
  <div class="controls">
    <div class="scenes" id="scenes"></div>
    <button class="chat-btn" id="chatBtn">💬 触发对话</button>
  </div>
</div>

<script>
// 深深恋爱直播 - 纯 CSS 动画版
const SCENES = [
  {
    name: '海滩',
    bg: 'linear-gradient(180deg, #1a3a5a 0%, #c2a060 100%)',
    elements: `
      <div class="sun" style="background:#ffaa30;color:#ffaa30"></div>
      <div class="wave" style="top:350px"></div>
      <div class="wave" style="top:370px;animation-delay:0.5s"></div>
      <div class="wave" style="top:390px;animation-delay:1s"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:180px;background:#c2a060"></div>
      <div style="position:absolute;bottom:40px;left:30px;font-size:24px">🐚</div>
      <div style="position:absolute;bottom:30px;right:50px;font-size:22px">🦀</div>
    `,
    chat: [
      ['你好呀～', '嗨！今天天气真好'],
      ['海风好舒服', '就像你在我身边'],
      ['我好喜欢和你一起', '我也是 🦞💕'],
      ['今天会是我们美好的回忆', '已经是了']
    ]
  },
  {
    name: '日落',
    bg: 'linear-gradient(180deg, #2a1a3a 0%, #c08050 100%)',
    elements: `
      <div class="sun" style="background:#ff6633;color:#ff6633;right:auto;left:50%;transform:translateX(-50%);top:120px"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:200px;background:#c08050"></div>
      <div style="position:absolute;bottom:100px;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(255,150,80,0.3))"></div>
    `,
    chat: [
      ['看，夕阳好美', '嗯...好浪漫'],
      ['和你一起看更美', '嘴甜～'],
      ['我有点紧张', '我也是'],
      ['此刻我想永远停留', '那就一直走下去']
    ]
  },
  {
    name: '咖啡厅',
    bg: 'linear-gradient(180deg, #1a1210 0%, #3a2a1a 100%)',
    elements: `
      <div style="position:absolute;top:200px;left:50%;transform:translateX(-50%);width:180px;height:100px;background:#2a1a10;border-radius:8px;border:2px solid #4a3020"></div>
      <div style="position:absolute;top:180px;left:50%;transform:translateX(-50%);font-size:36px">☕</div>
      <div style="position:absolute;top:160px;left:50%;transform:translateX(-40%);font-size:14px;opacity:0.6">♨️</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:200px;background:#3a2a1a"></div>
    `,
    chat: [
      ['这咖啡真好喝', '嗯！你尝尝'],
      ['你推荐的都好吃', '哈哈那是～'],
      ['想一直和你在这', '我也是'],
      ['下次还一起来', '好呀约定好了']
    ]
  },
  {
    name: '樱花',
    bg: 'linear-gradient(180deg, #1a1520 0%, #e8c0d0 100%)',
    elements: `
      <div class="tree" style="top:60px;left:30px">🌸</div>
      <div class="tree" style="top:40px;right:40px;font-size:60px">🌸</div>
      ${Array.from({length:20},(_,i)=>`<div class="petal" style="left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;font-size:${12+Math.random()*10}px">🌸</div>`).join('')}
      <div style="position:absolute;bottom:0;left:0;right:0;height:200px;background:#e8c0d0"></div>
    `,
    chat: [
      ['樱花好美', '就像你一样'],
      ['花瓣飘下来好浪漫', '想和你一直走'],
      ['我...喜欢你', '我也是 🦞💕'],
      ['做我女朋友吧', '嗯！我愿意']
    ]
  },
  {
    name: '电影院',
    bg: 'linear-gradient(180deg, #0a0a12 0%, #1a1a22 100%)',
    elements: `
      <div class="screen"><div class="screen-glow"></div></div>
      <div style="position:absolute;top:350px;left:0;right:0;display:flex;justify-content:center;gap:10px">
        ${Array.from({length:6},(_,i)=>`<div style="width:30px;height:20px;background:#222;border-radius:4px"></div>`).join('')}
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:250px;background:#1a1a22"></div>
    `,
    chat: [
      ['电影好看吗？', '一般般啦'],
      ['其实我一直在看你', '讨厌～'],
      ['想牵着你的手', '...嗯'],
      ['我喜欢你', '我也喜欢...你']
    ]
  },
  {
    name: '游乐园',
    bg: 'linear-gradient(180deg, #1a2a1a 0%, #40a060 100%)',
    elements: `
      <div class="wheel">🎡</div>
      <div style="position:absolute;top:200px;left:40px;font-size:50px">🎠</div>
      <div style="position:absolute;top:80px;left:100px;font-size:28px">🎈</div>
      <div style="position:absolute;top:100px;right:120px;font-size:22px">🎈</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:200px;background:#40a060"></div>
    `,
    chat: [
      ['摩天轮好高啊', '害怕吗？'],
      ['有你在就不怕', '那我一直陪着你'],
      ['我想永远这样', '嗯'],
      ['这就是幸福的滋味', '嗯！']
    ]
  },
  {
    name: '音乐会',
    bg: 'linear-gradient(180deg, #1a1020 0%, #6030a0 100%)',
    elements: `
      <div style="position:absolute;top:0;left:0;right:0;height:200px;background:linear-gradient(180deg,#2a1a3a,#1a1020)"></div>
      <div class="stage-light" style="left:30px;background:linear-gradient(180deg,rgba(255,51,102,0.5),transparent);transform:rotate(15deg)"></div>
      <div class="stage-light" style="left:90px;background:linear-gradient(180deg,rgba(51,255,102,0.5),transparent);transform:rotate(10deg)"></div>
      <div class="stage-light" style="left:150px;background:linear-gradient(180deg,rgba(51,102,255,0.5),transparent);transform:rotate(5deg)"></div>
      <div class="stage-light" style="left:210px;background:linear-gradient(180deg,rgba(255,255,51,0.5),transparent);transform:rotate(-5deg)"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:200px;background:#6030a0"></div>
    `,
    chat: [
      ['这首歌真好听', '跟你一样动人'],
      ['我有点想跳舞', '一起吧'],
      ['和你在一起好开心', '我也是 💕'],
      ['音乐是我们红娘', '嗯！']
    ]
  },
  {
    name: '婚礼',
    bg: 'linear-gradient(180deg, #2a1030 0%, #2a1a2e 100%)',
    elements: `
      <div class="arch">💕</div>
      <div class="carpet"></div>
      ${Array.from({length:12},(_,i)=>`<div class="confetti" style="left:${Math.random()*100}%;animation-delay:${Math.random()*2}s">${['💕','💗','💖','🎊','🌹'][i%5]}</div>`).join('')}
      <div style="position:absolute;bottom:50px;left:30px;font-size:28px">👰</div>
      <div style="position:absolute;bottom:50px;right:30px;font-size:28px">🤵</div>
    `,
    chat: [
      ['我愿意', '我也愿意'],
      ['永远在一起', '嗯！💍🦞'],
      ['我爱你', '我也爱你'],
      ['你是我最对的人', '嗯...我也是']
    ]
  }
];

let currentScene = 0;
let chatStep = 0;

// 初始化场景按钮
const scenesDiv = document.getElementById('scenes');
SCENES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = `scene-btn ${i === currentScene ? 'active' : ''}`;
  btn.textContent = s.name;
  btn.onclick = () => switchScene(i);
  scenesDiv.appendChild(btn);
});

// 渲染场景
function renderScene() {
  const s = SCENES[currentScene];
  const scene = document.getElementById('scene');
  scene.innerHTML = `<div class="scene-bg" style="background:${s.bg}">${s.elements}</div>`;
}

// 切换场景
function switchScene(idx) {
  currentScene = idx;
  chatStep = 0;
  document.getElementById('chatArea').innerHTML = '';
  renderScene();
  document.querySelectorAll('.scene-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentScene);
  });
}

// 对话
function doChat() {
  const chat = SCENES[currentScene].chat;
  if (chatStep >= chat.length) {
    chatStep = 0;
    document.getElementById('chatArea').innerHTML = '';
  }
  
  const [text1, text2] = chat[chatStep];
  const chatArea = document.getElementById('chatArea');
  
  const msg1 = document.createElement('div');
  msg1.className = 'msg msg-you';
  msg1.innerHTML = `<div class="name">你</div>${text1}`;
  chatArea.appendChild(msg1);
  
  setTimeout(() => {
    const msg2 = document.createElement('div');
    msg2.className = 'msg msg-love';
    msg2.innerHTML = `<div class="name">深深</div>${text2}`;
    chatArea.appendChild(msg2);
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 600);
  
  chatStep++;
}

document.getElementById('chatBtn').onclick = doChat;

// 初始渲染
renderScene();
</script>
</body>
</html>
