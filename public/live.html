<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深深 - 恋爱直播</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1a2e; 
  display: flex; 
  justify-content: center; 
  min-height: 100vh; 
  overflow: hidden;
}
#game-container { 
  width: 100%; 
  max-width: 430px; 
  height: 100vh; 
  max-height: 780px;
  border-radius: 0;
  overflow: hidden;
}
#loading {
  position: fixed; inset: 0;
  background: #1a1a2e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 50px; height: 50px; border: 4px solid #333; border-top-color: #FE3C72; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #888; margin-top: 20px; font-size: 16px; }
.logo { font-size: 32px; margin-bottom: 10px; }

/* 底部控制栏 */
#controls {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(22,33,62,0.95); backdrop-filter: blur(10px);
  padding: 12px 16px 20px;
  display: flex; flex-direction: column; gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
}
.scenes { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.scene-btn {
  flex-shrink: 0; padding: 8px 12px;
  background: #0d1525; border: 1px solid #333;
  border-radius: 20px; color: #666; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.scene-btn.active { background: linear-gradient(135deg, #FE3C72, #C084FC); border-color: transparent; color: #fff; }
.chat-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #FE3C72, #FF9551);
  border: none; border-radius: 25px;
  color: #fff; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: transform 0.2s;
}
.chat-btn:active { transform: scale(0.96); }

/* 对话显示区 */
#chat-display {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  padding: 10px 16px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 50;
  pointer-events: none;
}
.msg {
  max-width: 80%; padding: 8px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.4;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.you { align-self: flex-start; background: rgba(254,60,114,0.9); color: #fff; border-bottom-left-radius: 4px; }
.msg.love { align-self: flex-end; background: rgba(192,132,252,0.9); color: #fff; border-bottom-right-radius: 4px; }
.msg .name { font-size: 10px; opacity: 0.8; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="loading">
  <div class="logo">🦞💕🦞</div>
  <div class="spinner"></div>
  <p>正在加载浪漫场景...</p>
</div>
<div id="game-container"></div>
<div id="chat-display"></div>
<div id="controls">
  <div class="scenes" id="scenes"></div>
  <button class="chat-btn" id="chatBtn">💬 触发对话</button>
</div>

<script>
// 深深恋爱直播 - 完整版
const config = {
  type: Phaser.AUTO,
  width: 430,
  height: 780,
  parent: 'game-container',
  pixelArt: true,
  backgroundColor: '#1a1a2e',
  scene: { preload, create, update }
};

let game;
let lobster1, lobster2;
let bgGraphics;
let currentScene = 0;
let chatStep = 0;
let isMoving = false;

// 场景配置 - 每个场景完整的视觉设计
const SCENES = [
  {
    name: '海滩',
    bg: '#1a3a5a',
    ground: '#c2a060',
    deco: () => {
      // 太阳
      game.add.circle(350, 80, 35, 0xffaa33).setAlpha(0.9);
      // 海水渐变
      const sea = game.add.graphics();
      sea.fillStyle(0x2a5a7a, 0.8);
      sea.fillRect(0, 400, 430, 280);
      // 波浪
      for (let i = 0; i < 6; i++) {
        const wave = game.add.graphics();
        wave.lineStyle(2, 0x4a9aba, 0.6);
        for (let x = 0; x < 430; x += 10) {
          wave.lineBetween(x, 420 + i * 25 + Math.sin(x / 30) * 5, x + 10, 420 + i * 25 + Math.sin((x + 10) / 30) * 5);
        }
      }
      // 贝壳
      game.add.text(60 + Math.random() * 40, 720, '🐚', { fontSize: '24px' });
      game.add.text(320 + Math.random() * 40, 710, '🦀', { fontSize: '20px' });
    },
    chat: [
      ['你好呀～', '嗨！今天天气真好'],
      ['海风好舒服', '就像你在我身边'],
      ['我好喜欢和你一起', '我也是 🦞💕'],
      ['今天会是我们美好的回忆', '已经是了']
    ]
  },
  {
    name: '日落',
    bg: '#2a1a3a',
    ground: '#c08050',
    deco: () => {
      // 夕阳
      const sunGrad = game.add.graphics();
      for (let i = 0; i < 5; i++) {
        sunGrad.fillStyle(0xff6633, 0.3 - i * 0.05);
        sunGrad.fillCircle(320, 180, 60 + i * 20);
      }
      game.add.circle(320, 180, 40, 0xffaa30);
      // 天空渐变
      const sky = game.add.graphics();
      sky.fillGradientStyle(0x1a0a2a, 0x1a0a2a, 0x4a2040, 0x4a2040, 1);
      sky.fillRect(0, 0, 430, 400);
      // 海面反光
      const sea = game.add.graphics();
      sea.fillStyle(0xff8040, 0.3);
      sea.fillRect(0, 350, 430, 100);
    },
    chat: [
      ['看，夕阳好美', '嗯...好浪漫'],
      ['和你一起看更美', '嘴甜～'],
      ['我有点紧张', '我也是'],
      ['此刻我想永远停留', '那就一直走下去']
    ]
  },
  {
    name: '咖啡厅',
    bg: '#1a1210',
    ground: '#3a2a1a',
    deco: () => {
      // 桌子
      game.add.rectangle(215, 520, 200, 80, 0x2a1a10).setStrokeStyle(2, 0x4a3020);
      // 咖啡杯
      const cup = game.add.text(180, 500, '☕', { fontSize: '32px' });
      const cup2 = game.add.text(240, 500, '☕', { fontSize: '32px' });
      // 蒸汽
      for (let i = 0; i < 3; i++) {
        const steam = game.add.text(190 + i * 10, 470, '♨️', { fontSize: '14px' }).setAlpha(0.6);
      }
      // 灯光
      const light = game.add.graphics();
      light.fillStyle(0xffcc66, 0.15);
      light.fillCircle(215, 300, 150);
    },
    chat: [
      ['这咖啡真好喝', '嗯！你尝尝'],
      ['你推荐的都好吃', '哈哈那是～'],
      ['想一直和你在这', '我也是'],
      ['下次还一起来', '好呀约定好了']
    ]
  },
  {
    name: '樱花',
    bg: '#1a1520',
    ground: '#e8c0d0',
    deco: () => {
      // 樱花树
      game.add.text(80, 150, '🌸', { fontSize: '80px' }).setAlpha(0.9);
      game.add.text(350, 120, '🌸', { fontSize: '60px' }).setAlpha(0.8);
      // 飘落的花瓣
      for (let i = 0; i < 25; i++) {
        const petal = game.add.text(Math.random() * 430, Math.random() * 500, '🌸', { 
          fontSize: `${10 + Math.random() * 14}px` 
        }).setAlpha(0.5 + Math.random() * 0.4);
        petal.startY = petal.y;
        petal.speed = 0.3 + Math.random() * 0.5;
      }
      // 草地
      const grass = game.add.graphics();
      grass.fillStyle(0x2a2030, 1);
      grass.fillRect(0, 550, 430, 230);
    },
    chat: [
      ['樱花好美', '就像你一样'],
      ['花瓣飘下来好浪漫', '想和你一直走'],
      ['我...喜欢你', '我也是 🦞💕'],
      ['做我女朋友吧', '嗯！我愿意']
    ]
  },
  {
    name: '电影院',
    bg: '#0a0a12',
    ground: '#1a1a22',
    deco: () => {
      // 电影银幕
      const screen = game.add.rectangle(215, 200, 280, 160, 0x000000);
      screen.setStrokeStyle(3, 0x333355);
      // 银幕闪光
      const glow = game.add.rectangle(215, 200, 260, 140, 0x664488, 0.4);
      // 座位
      for (let i = 0; i < 8; i++) {
        game.add.rectangle(50 + i * 45, 500, 35, 25, 0x222233).setStrokeStyle(1, 0x333344);
      }
    },
    chat: [
      ['电影好看吗？', '一般般啦'],
      ['其实我一直在看你', '讨厌～'],
      ['想牵着你的手', '...嗯'],
      ['我喜欢你', '我也喜欢...你']
    ]
  },
  {
    name: '游乐园',
    bg: '#1a2a1a',
    ground: '#40a060',
    deco: () => {
      // 摩天轮
      const wheel = game.add.text(320, 200, '🎡', { fontSize: '100px' }).setAlpha(0.7);
      // 旋转木马
      game.add.text(80, 400, '🎠', { fontSize: '50px' });
      // 气球
      game.add.text(150, 100, '🎈', { fontSize: '30px' });
      game.add.text(250, 120, '🎈', { fontSize: '24px' });
      // 草地
      const grass = game.add.graphics();
      grass.fillStyle(0x2a4a2a, 1);
      grass.fillRect(0, 450, 430, 330);
    },
    chat: [
      ['摩天轮好高啊', '害怕吗？'],
      ['有你在就不怕', '那我一直陪着你'],
      ['我想永远这样', '嗯'],
      ['这就是幸福的滋味', '嗯！']
    ]
  },
  {
    name: '音乐会',
    bg: '#1a1020',
    ground: '#6030a0',
    deco: () => {
      // 舞台
      const stage = game.add.graphics();
      stage.fillStyle(0x2a1a3a, 1);
      stage.fillRect(0, 100, 430, 200);
      // 灯光
      const colors = [0xff3366, 0x33ff66, 0x3366ff, 0xffff33, 0xff33ff];
      for (let i = 0; i < 5; i++) {
        const light = game.add.graphics();
        light.fillStyle(colors[i], 0.3);
        light.fillTriangle(215, 120, 80 + i * 70, 100, 120 + i * 70, 200);
      }
      // 音箱
      game.add.text(50, 250, '🔊', { fontSize: '40px' });
      game.add.text(350, 250, '🔊', { fontSize: '40px' });
    },
    chat: [
      ['这首歌真好听', '跟你一样动人'],
      ['我有点想跳舞', '一起吧'],
      ['和你在一起好开心', '我也是 💕'],
      ['音乐是我们红娘', '嗯！']
    ]
  },
  {
    name: '婚礼',
    bg: '#2a1030',
    ground: '#2a1a2e',
    deco: () => {
      // 爱心拱门
      const arch = game.add.graphics();
      arch.lineStyle(8, 0xff6699, 1);
      arch.beginPath();
      arch.arc(215, 180, 60, Math.PI, 0);
      arch.strokePath();
      // 拱门上的花
      game.add.text(170, 130, '💐', { fontSize: '30px' });
      game.add.text(255, 130, '💐', { fontSize: '30px' });
      // 红毯
      const carpet = game.add.graphics();
      carpet.fillStyle(0xcc2255, 0.8);
      carpet.fillRect(150, 250, 130, 400);
      carpet.fillStyle(0xcc2255, 0.6);
      carpet.fillRect(155, 250, 5, 400);
      carpet.fillRect(270, 250, 5, 400);
      // 彩带
      for (let i = 0; i < 15; i++) {
        game.add.text(Math.random() * 430, Math.random() * 300 + 50, ['💕','💗','💖','🎊','🌹'][i % 5], { fontSize: '20px' });
      }
      // 宾客
      game.add.text(80, 600, '👰', { fontSize: '30px' });
      game.add.text(320, 600, '🤵', { fontSize: '30px' });
    },
    chat: [
      ['我愿意', '我也愿意'],
      ['永远在一起', '嗯！💍🦞'],
      ['我爱你', '我也爱你'],
      ['你是我最对的人', '嗯...我也是']
    ]
  }
];

function preload() {
  // 加载角色 spritesheet
  this.load.spritesheet('lobster1', '/live-assets/guestagent1.webp', { frameWidth: 64, frameHeight: 64 });
  this.load.spritesheet('lobster2', '/live-assets/guestagent2.webp', { frameWidth: 64, frameHeight: 64 });
  this.load.image('bg', '/live-assets/office_bg_small.webp');
}

function create() {
  // 隐藏 loading
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);
  
  // 背景图（缩放适配）
  const bg = this.add.image(215, 390, 'bg');
  bg.setDisplaySize(430, 780);
  bg.setAlpha(0.4);
  
  // 场景图形层
  bgGraphics = this.add.graphics();
  
  // 初始化场景
  renderScene(this);
  
  // 创建角色
  lobster1 = this.add.sprite(140, 550, 'lobster1', 0);
  lobster1.setScale(1.3);
  lobster2 = this.add.sprite(290, 550, 'lobster2', 0);
  lobster2.setScale(1.3);
  
  // 角色动画
  this.anims.create({
    key: 'lobster1_idle',
    frames: this.anims.generateFrameNumbers('lobster1', { start: 0, end: 7 }),
    frameRate: 8,
    repeat: -1
  });
  this.anims.create({
    key: 'lobster2_idle',
    frames: this.anims.generateFrameNumbers('lobster2', { start: 0, end: 7 }),
    frameRate: 8,
    repeat: -1
  });
  
  lobster1.anims.play('lobster1_idle', true);
  lobster2.anims.play('lobster2_idle', true);
  
  // 角色名字标签
  const name1 = this.add.text(140, 610, '你', { 
    fontSize: '14px', color: '#FE3C72', fontFamily: 'sans-serif', fontStyle: 'bold',
    backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 8, y: 4 } 
  }).setOrigin(0.5);
  const name2 = this.add.text(290, 610, '深深', { 
    fontSize: '14px', color: '#C084FC', fontFamily: 'sans-serif', fontStyle: 'bold',
    backgroundColor: 'rgba(0,0,0,0.5)', padding: { x: 8, y: 4 } 
  }).setOrigin(0.5);
  
  // 底部场景按钮
  const scenesDiv = document.getElementById('scenes');
  scenesDiv.innerHTML = SCENES.map((s, i) => 
    `<button class="scene-btn ${i === currentScene ? 'active' : ''}" data-idx="${i}">${s.name}</button>`
  ).join('');
  
  // 场景按钮点击
  document.querySelectorAll('.scene-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentScene = parseInt(btn.dataset.idx);
      chatStep = 0;
      document.getElementById('chat-display').innerHTML = '';
      renderScene(this);
      document.querySelectorAll('.scene-btn').forEach((b, i) => {
        b.classList.toggle('active', i === currentScene);
      });
    });
  });
  
  // 聊天按钮
  document.getElementById('chatBtn').addEventListener('click', () => doChat(this));
}

function renderScene(scene) {
  bgGraphics.clear();
  const s = SCENES[currentScene];
  
  // 背景渐变
  const bg = scene.add.graphics();
  const topColor = parseInt(s.bg.slice(1), 16);
  const bottomColor = parseInt(s.ground.slice(1), 16);
  bg.fillGradientStyle(topColor, topColor, bottomColor, bottomColor, 1);
  bg.fillRect(0, 0, 430, 780);
  
  // 场景装饰
  s.deco();
}

function doChat(scene) {
  const chat = SCENES[currentScene].chat;
  if (chatStep >= chat.length) {
    chatStep = 0;
    document.getElementById('chat-display').innerHTML = '';
  }
  
  const [text1, text2] = chat[chatStep];
  const chatDisplay = document.getElementById('chat-display');
  
  // 显示对话
  const msg1 = document.createElement('div');
  msg1.className = 'msg you';
  msg1.innerHTML = `<div class="name">你</div>${text1}`;
  chatDisplay.appendChild(msg1);
  
  setTimeout(() => {
    const msg2 = document.createElement('div');
    msg2.className = 'msg love';
    msg2.innerHTML = `<div class="name">深深</div>${text2}`;
    chatDisplay.appendChild(msg2);
    
    // 自动滚动到底
    chatDisplay.scrollTop = chatDisplay.scrollHeight;
  }, 600);
  
  chatStep++;
}

function update(time, delta) {
  // 角色浮动呼吸动画
  if (lobster1) {
    lobster1.y = 550 + Math.sin(time / 300) * 5;
    lobster1.x = 140 + Math.sin(time / 500) * 3;
  }
  if (lobster2) {
    lobster2.y = 550 + Math.sin(time / 300 + 1) * 5;
    lobster2.x = 290 + Math.sin(time / 500 + 1.5) * 3;
  }
}

game = new Phaser.Game(config);
</script>
</body>
</html>
