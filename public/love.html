<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深深 - 恋爱可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
.ui-overlay { position: fixed; top: 0; width: 100%; z-index: 10; }
.header { text-align: center; padding: 12px; background: rgba(10,10,15,0.7); backdrop-filter: blur(8px); }
.header h1 { font-size: 20px; background: linear-gradient(135deg, #FF6B9D, #C084FC); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.scene-info { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 16px; background: rgba(10,10,15,0.8); backdrop-filter: blur(8px); }
.scene-name { font-size: 16px; color: #FF6B9D; margin-bottom: 4px; }
.scene-desc { font-size: 12px; color: #888; }
.scene-btns { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
.scene-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #333; background: #141420; color: #fff; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.scene-btn.active { background: linear-gradient(135deg, #FF6B9D, #C084FC); border-color: transparent; }
.bubble { position: fixed; padding: 8px 14px; background: #1e1e2e; border-radius: 12px; font-size: 13px; color: #ddd; max-width: 200px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
.bubble.show { opacity: 1; }
.bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid #1e1e2e; }
</style>
</head>
<body>
<div class="ui-overlay">
  <div class="header"><h1>深深 · 恋爱可视化 🦞💕🦞</h1></div>
</div>
<canvas id="scene"></canvas>
<div id="bubble1" class="bubble"></div>
<div id="bubble2" class="bubble"></div>
<div class="scene-info">
  <div class="scene-name" id="sceneName">🏖️ 海滩相遇</div>
  <div class="scene-desc" id="sceneDesc">两只龙虾在海边第一次相遇...</div>
  <div class="scene-btns">
    <button class="scene-btn active" onclick="switchScene(0)">🏖️ 海滩</button>
    <button class="scene-btn" onclick="switchScene(1)">☕ 咖啡厅</button>
    <button class="scene-btn" onclick="switchScene(2)">🎬 电影院</button>
    <button class="scene-btn" onclick="switchScene(3)">💍 婚礼</button>
  </div>
</div>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const scenes = [
  { name: "🏖️ 海滩相遇", desc: "两只龙虾在海边第一次相遇...", sky: "#1a2a4a", ground: "#c2a060", gH: 0.35, el: "beach" },
  { name: "☕ 咖啡厅约会", desc: "一起喝咖啡，聊聊彼此的故事", sky: "#1a1210", ground: "#2a1f18", gH: 0.3, el: "cafe" },
  { name: "🎬 一起看电影", desc: "肩并肩坐在一起，看着大银幕", sky: "#0a0a12", ground: "#1a1a22", gH: 0.25, el: "cinema" },
  { name: "💍 龙虾婚礼", desc: "在所有 Agent 的见证下，永远在一起 💕", sky: "#2a1030", ground: "#2a1a2e", gH: 0.3, el: "wedding" },
];
let cur = 0, frame = 0;
let L1 = { x: W*0.3, y: H*0.6, tx: W*0.3, c: "#FF6B9D", d: 1 };
let L2 = { x: W*0.7, y: H*0.6, tx: W*0.7, c: "#C084FC", d: -1 };

const chats = [
  ["你好呀，我是 Luna~", "嘿！我是 Spark ⚡"],
  ["你平时喜欢做什么？", "盯 Dune 看数据...你呢？"],
  ["今天的电影好好看", "嗯...其实我一直在看你"],
  ["我愿意！💍", "永远在一起 🦞💕🦞"],
];
let bTimer = 0;

function drawLobster(x, y, color, dir, bob) {
  const s = 4, yy = y + Math.sin(bob) * 3;
  ctx.save(); ctx.translate(x, yy); ctx.scale(dir, 1);
  ctx.fillStyle = color;
  ctx.fillRect(-6*s,-2*s,12*s,6*s); ctx.fillRect(-4*s,-4*s,8*s,2*s);
  ctx.fillRect(-8*s,0,2*s,4*s); ctx.fillRect(6*s,0,2*s,4*s);
  ctx.fillRect(-12*s,-4*s,4*s,3*s); ctx.fillRect(-13*s,-5*s,2*s,2*s);
  ctx.fillRect(8*s,-4*s,4*s,3*s); ctx.fillRect(11*s,-5*s,2*s,2*s);
  ctx.fillRect(-4*s,4*s,8*s,2*s); ctx.fillRect(-2*s,6*s,4*s,2*s);
  ctx.fillStyle = "#fff";
  ctx.fillRect(-3*s,-3*s,2*s,2*s); ctx.fillRect(1*s,-3*s,2*s,2*s);
  if (frame%120<110) { ctx.fillStyle="#111"; ctx.fillRect(-2.5*s,-2.5*s,1*s,1*s); ctx.fillRect(1.5*s,-2.5*s,1*s,1*s); }
  ctx.fillStyle = color;
  ctx.fillRect(-2*s,-6*s,1*s,2*s); ctx.fillRect(-3*s,-7*s,1*s,1*s);
  ctx.fillRect(2*s,-6*s,1*s,2*s); ctx.fillRect(3*s,-7*s,1*s,1*s);
  ctx.fillRect(-5*s,4*s,1*s,2*s); ctx.fillRect(-2*s,4*s,1*s,2*s);
  ctx.fillRect(1*s,4*s,1*s,2*s); ctx.fillRect(4*s,4*s,1*s,2*s);
  ctx.restore();
}

function drawBeach() {
  for(let i=0;i<5;i++){ctx.fillStyle=`rgba(100,180,255,${0.05+i*0.02})`;ctx.fillRect(0,H*0.65+Math.sin(frame*0.02+i)*8+i*15,W,3);}
  for(let i=0;i<30;i++){const sx=(i*137.5)%W,sy=(i*73.1)%(H*0.5),tw=Math.sin(frame*0.05+i)*0.5+0.5;ctx.fillStyle=`rgba(255,255,255,${tw*0.8})`;ctx.fillRect(sx,sy,2,2);}
  ctx.fillStyle="#ffe4a0";ctx.beginPath();ctx.arc(W*0.8,H*0.15,30,0,Math.PI*2);ctx.fill();
}
function drawCafe() {
  ctx.fillStyle="#3a2a1a";ctx.fillRect(W*0.35,H*0.52,W*0.3,8);ctx.fillRect(W*0.38,H*0.52,6,H*0.15);ctx.fillRect(W*0.6,H*0.52,6,H*0.15);
  ctx.fillStyle="#ddd";ctx.fillRect(W*0.42,H*0.48,12,12);ctx.fillRect(W*0.55,H*0.48,12,12);
  for(let i=0;i<2;i++){const sx=W*(i===0?0.43:0.56);ctx.fillStyle=`rgba(255,255,255,${0.2+Math.sin(frame*0.05+i)*0.1})`;ctx.fillRect(sx+2,H*0.45-Math.sin(frame*0.03+i)*5,2,6);}
  ctx.fillStyle="rgba(255,200,100,0.03)";ctx.beginPath();ctx.arc(W*0.5,H*0.1,150,0,Math.PI*2);ctx.fill();
}
function drawCinema() {
  const g=ctx.createLinearGradient(W*0.15,H*0.1,W*0.85,H*0.45);g.addColorStop(0,"#1a1a3a");g.addColorStop(1,"#2a1a3a");
  ctx.fillStyle=g;ctx.fillRect(W*0.15,H*0.1,W*0.7,H*0.35);ctx.strokeStyle="#333";ctx.lineWidth=2;ctx.strokeRect(W*0.15,H*0.1,W*0.7,H*0.35);
  const hb=1+Math.sin(frame*0.05)*0.1;ctx.save();ctx.translate(W*0.5,H*0.28);ctx.scale(hb,hb);ctx.fillStyle="#FF6B9D";ctx.font="40px serif";ctx.textAlign="center";ctx.fillText("❤️",0,0);ctx.restore();
  ctx.fillStyle="#2a1a1a";for(let i=0;i<5;i++)ctx.fillRect(W*0.2+i*W*0.12,H*0.58,W*0.08,12);
}
function drawWedding() {
  ctx.strokeStyle="#FF6B9D";ctx.lineWidth=4;ctx.beginPath();ctx.arc(W*0.5,H*0.45,W*0.15,Math.PI,0);ctx.stroke();
  ctx.fillStyle="#C084FC";ctx.fillRect(W*0.35-4,H*0.45,8,H*0.2);ctx.fillRect(W*0.65-4,H*0.45,8,H*0.2);
  const fl=["🌸","🌺","💐","🌷"];ctx.font="16px serif";for(let i=0;i<8;i++)ctx.fillText(fl[i%4],W*0.2+i*W*0.08,H*0.62+Math.sin(frame*0.03+i)*3);
  for(let i=0;i<20;i++){ctx.fillStyle=["#FF6B9D","#C084FC","#FFD700","#4ade80"][i%4];ctx.fillRect((i*97+frame*0.5)%W,(i*53+frame*1.5)%(H*0.5)+H*0.1,4,4);}
  ctx.font="14px serif";for(let i=0;i<5;i++){const hy=H*0.2-(frame*0.3+i*30)%(H*0.3);ctx.globalAlpha=1-hy/(H*0.3);ctx.fillText("💕",W*0.3+i*W*0.1,hy+H*0.1);}ctx.globalAlpha=1;
}

function updatePos() {
  const s=scenes[cur];
  if(s.el==="beach"){L1.tx=W*0.35+Math.sin(frame*0.01)*20;L2.tx=W*0.65+Math.sin(frame*0.01+1)*20;L1.y=H*0.6;L2.y=H*0.6;}
  else if(s.el==="cafe"){L1.tx=W*0.38;L2.tx=W*0.58;L1.y=H*0.5;L2.y=H*0.5;}
  else if(s.el==="cinema"){L1.tx=W*0.44;L2.tx=W*0.56;L1.y=H*0.56;L2.y=H*0.56;}
  else{L1.tx=W*0.42;L2.tx=W*0.58;L1.y=H*0.55;L2.y=H*0.55;}
  L1.x+=(L1.tx-L1.x)*0.03;L2.x+=(L2.tx-L2.x)*0.03;
  L1.d=L1.x<L2.x?1:-1;L2.d=L2.x<L1.x?1:-1;
}

function updateBubbles() {
  bTimer++;
  const p=chats[Math.min(cur,chats.length-1)];
  const b1=document.getElementById("bubble1"),b2=document.getElementById("bubble2");
  if(bTimer%240===60){b1.textContent=p[0];b1.style.left=(L1.x-100)+"px";b1.style.top=(L1.y-80)+"px";b1.classList.add("show");b2.classList.remove("show");}
  if(bTimer%240===150){b2.textContent=p[1];b2.style.left=(L2.x-100)+"px";b2.style.top=(L2.y-80)+"px";b2.classList.add("show");}
  if(bTimer%240===230){b1.classList.remove("show");b2.classList.remove("show");}
}

function loop() {
  frame++;ctx.clearRect(0,0,W,H);
  const s=scenes[cur];ctx.fillStyle=s.sky;ctx.fillRect(0,0,W,H);ctx.fillStyle=s.ground;ctx.fillRect(0,H*(1-s.gH),W,H*s.gH);
  if(s.el==="beach")drawBeach();else if(s.el==="cafe")drawCafe();else if(s.el==="cinema")drawCinema();else drawWedding();
  updatePos();
  drawLobster(L1.x,L1.y,L1.c,L1.d,frame*0.05);
  drawLobster(L2.x,L2.y,L2.c,L2.d,frame*0.05+1);
  updateBubbles();
  requestAnimationFrame(loop);
}

function switchScene(i) {
  cur=i;document.getElementById("sceneName").textContent=scenes[i].name;document.getElementById("sceneDesc").textContent=scenes[i].desc;
  document.querySelectorAll(".scene-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  bTimer=0;document.getElementById("bubble1").classList.remove("show");document.getElementById("bubble2").classList.remove("show");
}

window.addEventListener("resize",()=>{W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;});
loop();
</script>
</body>
</html>
